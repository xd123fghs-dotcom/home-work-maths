<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathMaster P.5 - หน้าแรก</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;600&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            /* บล็อกการไฮไลต์สีฟ้าครอบข้อความ (Text Selection) ทั่วทั้งหน้า */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            overflow: hidden;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }
        .hero-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 4rem 2rem;
            border-radius: 2.5rem;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            animation: float 6s ease-in-out infinite;
        }
        h1 {
            font-family: 'Mitr', sans-serif;
            font-size: 2.5rem;
            color: #1e293b;
            margin-bottom: 1rem;
            line-height: 1.3;
        }
        p {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }
        .go-btn {
            display: inline-block;
            font-family: 'Mitr', sans-serif;
            background: linear-gradient(135deg, #4361ee 0%, #3f37c9 100%);
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            border-radius: 1rem;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
            cursor: pointer;
        }
        .go-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(67, 97, 238, 0.4);
        }
    </style>
</head>
<body>

    <div class="hero-box">
        <h1>📝 เว็บเฉลยการบ้าน<br>คณิตศาสตร์ ป.5</h1>
        <p>รวมวิธีทำเศษส่วนและจำนวนคละแบบละเอียด 6 ข้อ ตรวจคำตอบได้ง่ายๆ บนมือถือและคอมพิวเตอร์</p>
        <a href="homework.html" class="go-btn">ดูเฉลยการบ้านเลย ➔</a>
    </div>

    <script>
        // บล็อกการคลิกขวา (Context Menu) สำหรับหน้าแรกด้วยครับ
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });
    </script>
</body>
</html>
