<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathMaster P.5 - รายการเฉลยแบบละเอียด</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           1. CORE DESIGN SYSTEM & MOBILE FIRST
           ========================================== */
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --secondary: #3f37c9;
            --success: #4ade80;
            --dark: #0f172a;
            --light: #f8fafc;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* [แก้ไข] บล็อกการไฮไลต์สีฟ้าครอบข้อความ (Text Selection) สำหรับทุกเบราว์เซอร์ */
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE10+ */
            user-select: none;         /* Standard */
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            overflow-x: hidden;
            min-height: 100vh;
        }

        h2, h3, h4, .back-btn {
            font-family: 'Mitr', sans-serif;
        }

        /* ==========================================
           2. ANIMATIONS RETURN
           ========================================== */
        @keyframes slideInRight { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInLeft { from { transform: translateX(-25px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes drawLine { from { width: 0; } to { width: 100%; } }
        @keyframes successPop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* ==========================================
           3. UI LAYOUT
           ========================================== */
        .top-bar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.02);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .back-btn {
            background: white;
            color: var(--dark);
            text-decoration: none;
            padding: 0.6rem 1.3rem;
            border-radius: 0.85rem;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.01);
        }

        .back-btn:hover {
            background: #f1f5f9;
            transform: translateX(-3px);
        }

        .main-layout {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        /* Sidebar เมนูโจทย์ */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .quiz-card {
            background: white;
            padding: 1.2rem 1.5rem;
            border-radius: 1.25rem;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            box-shadow: var(--shadow);
            animation: slideInLeft 0.4s ease-out backwards;
        }

        .quiz-card:nth-child(1) { animation-delay: 0.05s; }
        .quiz-card:nth-child(2) { animation-delay: 0.10s; }
        .quiz-card:nth-child(3) { animation-delay: 0.15s; }
        .quiz-card:nth-child(4) { animation-delay: 0.20s; }
        .quiz-card:nth-child(5) { animation-delay: 0.25s; }
        .quiz-card:nth-child(6) { animation-delay: 0.30s; }

        .quiz-card:hover {
            transform: translateY(-2px) translateX(4px);
            border-color: var(--primary-light);
        }

        .quiz-card.active {
            border-color: var(--primary);
            background: #eff6ff;
            box-shadow: 0 8px 20px -5px rgba(67, 97, 238, 0.15);
        }

        .quiz-card h4 {
            color: var(--primary);
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .math-text {
            font-size: 1.3rem;
            font-weight: 800;
        }

        /* Viewer กล่องขวาแสดงวิธีทำ */
        .viewer {
            background: white;
            border-radius: 1.75rem;
            padding: 2.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: var(--shadow);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .empty {
            margin: auto;
            text-align: center;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .empty span {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }

        /* ==========================================
           4. MATH FRACTION SYSTEM (โครงสร้างเศษส่วนสมจริง)
           ========================================== */
        .frac {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            padding: 0 5px;
        }

        .line {
            width: 100%;
            height: 2px;
            background: currentColor;
            margin: 2px 0;
            animation: drawLine 0.4s ease-out forwards;
        }

        .whole {
            font-size: 1.6rem;
            margin-right: 2px;
            font-weight: 900;
        }

        .step-row {
            display: flex;
            align-items: center;
            font-size: clamp(1.15rem, 3.5vw, 1.45rem);
            font-weight: 700;
            min-height: 3.5rem;
            opacity: 0;
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .step-row:nth-child(1) { animation-delay: 0.05s; }
        .step-row:nth-child(2) { animation-delay: 0.12s; }
        .step-row:nth-child(3) { animation-delay: 0.19s; }
        .step-row:nth-child(4) { animation-delay: 0.26s; }
        .step-row:nth-child(5) { animation-delay: 0.33s; }
        .step-row:nth-child(6) { animation-delay: 0.40s; }

        .label {
            width: 90px;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 400;
            flex-shrink: 0;
        }

        .ans-highlight {
            background: #f0fdf4;
            border: 2px dashed var(--success);
            padding: 1rem 2rem;
            border-radius: 1.25rem;
            color: #166534;
            margin-top: 1.5rem;
            display: inline-flex;
            align-items: center;
            opacity: 0;
            animation: successPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* ==========================================
           5. MOBILE RESPONSIVE
           ========================================== */
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
                padding: 1rem;
                gap: 1.5rem;
            }
            .top-bar { padding: 1rem; }
            .viewer { padding: 1.5rem; min-height: 420px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn">🔙 กลับหน้าแรก</a>
        <h3 style="color: var(--primary);">MathMaster P.5</h3>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="menu-box"></div>
        <div class="viewer" id="view-box">
            <div class="empty">
                <span>📓</span>
                <p>เลือกข้อโจทย์ด้านซ้าย (หรือกดด้านบนในมือถือ) เพื่อดูวิธีทำแบบละเอียด</p>
            </div>
        </div>
    </div>

    <script>
        const data = [
            {
                id: 1,
                ui: `<span class="whole">2</span><div class="frac"><span>2</span><div class="line"></div><span>5</span></div> + <div class="frac"><span>23</span><div class="line"></div><span>10</span></div>`,
                steps: [
                    `= <div class="frac"><span>12</span><div class="line"></div><span>5</span></div> + <div class="frac"><span>23</span><div class="line"></div><span>10</span></div>`,
                    `= <div class="frac"><span>(12 × 2)</span><div class="line"></div><span>(5 × 2)</span></div> + <div class="frac"><span>23</span><div class="line"></div><span>10</span></div>`,
                    `= <div class="frac"><span>24</span><div class="line"></div><span>10</span></div> + <div class="frac"><span>23</span><div class="line"></div><span>10</span></div>`,
                    `= <div class="frac"><span>47</span><div class="line"></div><span>10</span></div>`
                ],
                ans: `<span class="whole">4</span><div class="frac"><span>7</span><div class="line"></div><span>10</span></div>`
            },
            {
                id: 2,
                ui: `<span class="whole">3</span><div class="frac"><span>4</span><div class="line"></div><span>5</span></div> + <div class="frac"><span>3</span><div class="line"></div><span>2</span></div>`,
                steps: [
                    `= <div class="frac"><span>19</span><div class="line"></div><span>5</span></div> + <div class="frac"><span>3</span><div class="line"></div><span>2</span></div>`,
                    `= <div class="frac"><span>(19 × 2)</span><div class="line"></div><span>(5 × 2)</span></div> + <div class="frac"><span>(3 × 5)</span><div class="line"></div><span>(2 × 5)</span></div>`,
                    `= <div class="frac"><span>38</span><div class="line"></div><span>10</span></div> + <div class="frac"><span>15</span><div class="line"></div><span>10</span></div>`,
                    `= <div class="frac"><span>53</span><div class="line"></div><span>10</span></div>`
                ],
                ans: `<span class="whole">5</span><div class="frac"><span>3</span><div class="line"></div><span>10</span></div>`
            },
            {
                id: 3,
                ui: `<span class="whole">1</span><div class="frac"><span>2</span><div class="line"></div><span>11</span></div> + <div class="frac"><span>13</span><div class="line"></div><span>9</span></div>`,
                steps: [
                    `= <div class="frac"><span>13</span><div class="line"></div><span>11</span></div> + <div class="frac"><span>13</span><div class="line"></div><span>9</span></div>`,
                    `= <div class="frac"><span>(13 × 9)</span><div class="line"></div><span>(11 × 9)</span></div> + <div class="frac"><span>(13 × 11)</span><div class="line"></div><span>(9 × 11)</span></div>`,
                    `= <div class="frac"><span>117</span><div class="line"></div><span>99</span></div> + <div class="frac"><span>143</span><div class="line"></div><span>99</span></div>`,
                    `= <div class="frac"><span>260</span><div class="line"></div><span>99</span></div>`
                ],
                ans: `<span class="whole">2</span><div class="frac"><span>62</span><div class="line"></div><span>99</span></div>`
            },
            {
                id: 4,
                ui: `<div class="frac"><span>7</span><div class="line"></div><span>2</span></div> + <span class="whole">4</span><div class="frac"><span>3</span><div class="line"></div><span>13</span></div>`,
                steps: [
                    `= <div class="frac"><span>7</span><div class="line"></div><span>2</span></div> + <div class="frac"><span>55</span><div class="line"></div><span>13</span></div>`,
                    `= <div class="frac"><span>(7 × 13)</span><div class="line"></div><span>(2 × 13)</span></div> + <div class="frac"><span>(55 × 2)</span><div class="line"></div><span>(13 × 2)</span></div>`,
                    `= <div class="frac"><span>91</span><div class="line"></div><span>26</span></div> + <div class="frac"><span>110</span><div class="line"></div><span>26</span></div>`,
                    `= <div class="frac"><span>201</span><div class="line"></div><span>26</span></div>`
                ],
                ans: `<span class="whole">7</span><div class="frac"><span>19</span><div class="line"></div><span>26</span></div>`
            },
            {
                id: 5,
                ui: `<div class="frac"><span>15</span><div class="line"></div><span>8</span></div> + <span class="whole">1</span><div class="frac"><span>5</span><div class="line"></div><span>6</span></div>`,
                steps: [
                    `= <div class="frac"><span>15</span><div class="line"></div><span>8</span></div> + <div class="frac"><span>11</span><div class="line"></div><span>6</span></div>`,
                    `= <div class="frac"><span>(15 × 3)</span><div class="line"></div><span>(8 × 3)</span></div> + <div class="frac"><span>(11 × 4)</span><div class="line"></div><span>(6 × 4)</span></div>`,
                    `= <div class="frac"><span>45</span><div class="line"></div><span>24</span></div> + <div class="frac"><span>44</span><div class="line"></div><span>24</span></div>`,
                    `= <div class="frac"><span>89</span><div class="line"></div><span>24</span></div>`
                ],
                ans: `<span class="whole">3</span><div class="frac"><span>17</span><div class="line"></div><span>24</span></div>`
            },
            {
                id: 6,
                ui: `<div class="frac"><span>8</span><div class="line"></div><span>7</span></div> + <span class="whole">2</span><div class="frac"><span>4</span><div class="line"></div><span>11</span></div>`,
                steps: [
                    `= <div class="frac"><span>8</span><div class="line"></div><span>7</span></div> + <div class="frac"><span>26</span><div class="line"></div><span>11</span></div>`,
                    `= <div class="frac"><span>(8 × 11)</span><div class="line"></div><span>(7 × 11)</span></div> + <div class="frac"><span>(26 × 7)</span><div class="line"></div><span>(11 × 7)</span></div>`,
                    `= <div class="frac"><span>88</span><div class="line"></div><span>77</span></div> + <div class="frac"><span>182</span><div class="line"></div><span>77</span></div>`,
                    `= <div class="frac"><span>270</span><div class="line"></div><span>77</span></div>`
                ],
                ans: `<span class="whole">3</span><div class="frac"><span>39</span><div class="line"></div><span>77</span></div>`
            }
        ];

        function init() {
            document.getElementById('menu-box').innerHTML = data.map(item => `
                <div class="quiz-card" id="c-${item.id}" onclick="show(${item.id})">
                    <h4>โจทย์ข้อที่ ${item.id}</h4>
                    <div class="math-text">${item.ui}</div>
                </div>
            `).join('');
        }

        function show(id) {
            document.querySelectorAll('.quiz-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`c-${id}`).classList.add('active');
            
            const item = data.find(x => x.id === id);
            const viewBox = document.getElementById('view-box');
            
            if(window.innerWidth <= 900) {
                setTimeout(() => {
                    viewBox.scrollIntoView({behavior:'smooth', block:'start'});
                }, 100);
            }

            let stepsHtml = item.steps.map((st, i) => `
                <div class="step-row"><span class="label">${i===0?'วิธีทำ':''}</span><div>${st}</div></div>
            `).join('');

            viewBox.innerHTML = `
                <div style="border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem; margin-bottom: 1.5rem;">
                    <h2 style="font-size: 1.4rem; color: var(--primary)">วิธีทำ ข้อที่ ${item.id}</h2>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <div class="step-row"><span class="label">โจทย์</span><div>${item.ui}</div></div>
                    ${stepsHtml}
                    <div>
                        <div class="step-row ans-highlight" style="animation-delay: ${item.steps.length * 0.12}s">
                            <span class="label" style="color:#166534; font-weight: bold;">ตอบ</span>
                            <div style="font-size:1.7rem; font-weight: 800;">${item.ans}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // [แก้ไข] ดักจับ Event บล็อกการคลิกขวา (Context Menu) ทั้งหน้าเว็บ
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });

        window.onload = init;
    </script>
</body>
</html>
